services:
  nginx:
    image: nginx:1.28.3-alpine
    ports:
      - 80:80
    restart: always
    volumes:
      - ./app-data/nginx-conf/nginx.conf:/etc/nginx/nginx.conf
      - ./app-data/nginx-conf/default.conf:/etc/nginx/conf.d/default.conf
      - ./app-data/.bashrc:/root/.bashrc
    networks:
      - web

networks:
  web:
    driver: bridge